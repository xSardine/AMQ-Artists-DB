<div *ngIf="rankedStatus.active" class="ranked-banner" role="status" aria-live="polite">
  <span class="ranked-banner-icon" aria-hidden="true"><i class="fa fa-shield"></i></span>
  <span class="ranked-banner-text">
    <span class="ranked-banner-title">AMQ Ranked</span>
    <span class="ranked-banner-region">{{ rankedStatus.region }}</span>
    Some functionality disabled – <strong>{{ searchRequestService.formatRankedRemaining(rankedStatus) }}</strong> remaining
  </span>
  <button
    type="button"
    class="ranked-banner-info tooltip"
    aria-label="About AMQ Ranked restrictions"
  >
    <i class="fa fa-info-circle" aria-hidden="true"></i>
    <span class="tooltiptext ranked-banner-info-tooltip">
      <strong>What is Ranked?</strong>
      <p>
        Ranked is a daily scheduled multiplayer mode in Anime Music Quiz. During this time, AnisongDB limits
        features that could expose song audio and song/artist/composer scouting to prevent cheating.
      </p>

      <strong>Schedule</strong>
      <p>
        Each window runs 8:30 PM–9:23 PM (53 minutes) during that region's local time.
      </p>
      <ul>
        <li><strong>Central</strong> Europe/Copenhagen (CET/CEST)</li>
        <li><strong>Western</strong> America/Chicago (CDT/CST)</li>
        <li><strong>Eastern</strong> Asia/Tokyo (JST)</li>
      </ul>

      <strong>API Endpoints Disabled</strong>
      <ul>
        <li>Song name search</li>
        <li>Artist search</li>
        <li>Composer search</li>
      </ul>

      <strong>Table &amp; UI disabled</strong>
      <ul>
        <li>Song Links column</li>
        <li>Play Audio column</li>
        <li>Artist, composer, and arranger quick-search icons</li>
      </ul>
    </span>
  </button>
</div>

<div class="search-bar-header">
  <div *ngIf="!showAdvancedFilters" class="mainFilter">
    <button id="search-btn-main" type="button" class="search-btn" (click)="onSearchCallKey()">Search</button>

    <input
      id="search-input-main"
      #mainFilterInput
      [placeholder]="rankedStatus.active ? 'Search by anime' : 'Search by anime, song name or artist'"
      [title]="rankedStatus.active ? 'Search by anime' : 'Search by anime, song name or artist'"
      class="textInputFilter main-search-input"
      type="search"
      maxlength="500"
      (keyup.enter)="onSearchCallKey()"
      (input)="mainFilter = mainFilterInput.value"
    />

    <label class="check" for="search-main-checkbox-op"
      ><input
        id="search-main-checkbox-op"
        type="checkbox"
        (change)="showOpenings = !showOpenings"
        [checked]="showOpenings"
      />
      OP
    </label>
    <label class="check" for="search-main-checkbox-ed"
      ><input
        id="search-main-checkbox-ed"
        type="checkbox"
        (change)="showEndings = !showEndings"
        [checked]="showEndings"
      />
      ED
    </label>
    <label class="check" for="search-main-checkbox-ins"
      ><input
        id="search-main-checkbox-ins"
        type="checkbox"
        (change)="showInserts = !showInserts"
        [checked]="showInserts"
      />
      INS
    </label>

    <label class="check" for="search-main-checkbox-ignore-duplicates"
      ><input
        id="search-main-checkbox-ignore-duplicates"
        type="checkbox"
        (change)="ignoreDuplicate = !ignoreDuplicate"
        [checked]="ignoreDuplicate"
      />
      Ignore Duplicates
    </label>

    <label
      class="check"
      for="search-main-checkbox-partial-match"
      title="If activated, results only have to contain the filter and not match it exactly"
      ><input
        id="search-main-checkbox-partial-match"
        type="checkbox"
        (change)="mainFilterPartialMatch = !mainFilterPartialMatch"
        [checked]="mainFilterPartialMatch"
      />
      Partial Match
    </label>
  </div>

  <div class="search-bar-actions">
    <button
      id="search-toggle-advanced"
      type="button"
      class="showFilter"
      [title]="showAdvancedFilters ? 'Switch to simple search' : 'Toggle advanced filters'"
      (click)="showAdvancedFilters = !showAdvancedFilters; mainFilter = ''"
    >
      <i class="fa fa-cog"></i> {{ showAdvancedFilters ? 'Simple' : 'Advanced' }}
    </button>

    <a
      id="search-download-json"
      class="showFilter"
      title="Download Song List as JSON"
      (click)="generateDownloadJsonUri()"
      [href]="downloadJsonHref"
      download="{{ downloadFileName }}"
    >
      <i class="fa fa-download"></i> JSON
    </a>

    <button
      id="search-help-json"
      type="button"
      class="helpButton"
      title="What can I do with that JSON?"
      (click)="openJsonHelp()"
    >
      <i class="fa fa-question-circle"></i>
    </button>
  </div>
</div>

<div *ngIf="showAdvancedFilters" class="filters">
    <div class="filter-field-row">
      <label class="check" for="search-adv-checkbox-op"
        ><input
          id="search-adv-checkbox-op"
          type="checkbox"
          (change)="showOpenings = !showOpenings"
          [checked]="showOpenings"
        />
        OP
      </label>
      <label class="check" for="search-adv-checkbox-ed"
        ><input
          id="search-adv-checkbox-ed"
          type="checkbox"
          (change)="showEndings = !showEndings"
          [checked]="showEndings"
        />
        ED
      </label>
      <label class="check" for="search-adv-checkbox-ins"
        ><input
          id="search-adv-checkbox-ins"
          type="checkbox"
          (change)="showInserts = !showInserts"
          [checked]="showInserts"
        />
        INS
      </label>
      <span
        id="search-adv-help-filters"
        class="helpButton"
        title="Help understanding settings"
        onClick="window.open('https://github.com/xSardine/AMQ-Artists-DB#filters','_blank')"
      >
        <i class="fa fa-question-circle"></i>
      </span>
    </div>

    <div class="filter-field-row">
      <input
        id="search-input-anime"
        #animeFilterInput
        class="textInputFilter filter-input"
        type="search"
        maxlength="500"
        placeholder="Search by anime..."
        title="Search by anime name"
        (keyup.enter)="onSearchCallKey()"
        (input)="animeFilter = animeFilterInput.value"
      />

      <label
        class="check"
        for="search-adv-checkbox-anime-partial-match"
        title="If activated, results only have to contain the filter and not match it exactly"
        ><input
          id="search-adv-checkbox-anime-partial-match"
          type="checkbox"
          (change)="animeFilterPartialMatch = !animeFilterPartialMatch"
          [checked]="animeFilterPartialMatch"
        />
        Partial Match
      </label>
    </div>

    <div class="filter-field-row">
      <input
        id="search-input-song-name"
        #songNameFilterInput
        class="textInputFilter filter-input"
        placeholder="Search by song name..."
        title="Search by song name"
        type="search"
        maxlength="500"
        (keyup.enter)="onSearchCallKey()"
        (input)="songNameFilter = songNameFilterInput.value"
      />

      <label
        class="check"
        for="search-adv-checkbox-song-name-partial-match"
        title="If activated, results only have to contain the filter and not match it exactly"
        ><input
          id="search-adv-checkbox-song-name-partial-match"
          type="checkbox"
          (change)="songNameFilterPartialMatch = !songNameFilterPartialMatch"
          [checked]="songNameFilterPartialMatch"
        />
        Partial Match
      </label>
    </div>

    <div class="filter-field-row loose">
      <input
        id="search-input-artist"
        #artistFilterInput
        class="textInputFilter filter-input"
        placeholder="Search by artist..."
        type="search"
        maxlength="500"
        title="Search by artist"
        (keyup.enter)="onSearchCallKey()"
        (input)="artistFilter = artistFilterInput.value"
      />

      <label
        class="check"
        for="search-adv-checkbox-artist-partial-match"
        title="If activated, results only have to contain the filter and not match it exactly"
        ><input
          id="search-adv-checkbox-artist-partial-match"
          type="checkbox"
          (change)="artistFilterPartialMatch = !artistFilterPartialMatch"
          [checked]="artistFilterPartialMatch"
        />
        Partial Match
      </label>
    </div>

    <div class="filter-field-row loose">
      <input
        id="search-input-composer"
        #composerFilterInput
        class="textInputFilter filter-input"
        placeholder="Search by composer..."
        type="search"
        maxlength="500"
        title="Search by composer"
        (keyup.enter)="onSearchCallKey()"
        (input)="composerFilter = composerFilterInput.value"
      />

      <label
        class="check"
        for="search-adv-checkbox-composer-partial-match"
        title="If activated, results only have to contain the filter and not match it exactly"
        ><input
          id="search-adv-checkbox-composer-partial-match"
          type="checkbox"
          (change)="composerFilterPartialMatch = !composerFilterPartialMatch"
          [checked]="composerFilterPartialMatch"
        />
        Partial Match
      </label>
      <label
        class="check"
        for="search-adv-checkbox-composer-arrangement"
        title="If activated, it will also add songs where they only participated in the arrangement"
      >
        <input
          id="search-adv-checkbox-composer-arrangement"
          type="checkbox"
          (change)="composerFilterArrangement = !composerFilterArrangement"
          [checked]="composerFilterArrangement"
        />
        Arrangement
      </label>
    </div>

    <div class="filter-field-row loose">
      <label class="numeric-filter" for="search-input-max-other-people">
        <div class="tooltip">
          Max Other People
          <span class="tooltiptext">This is the maximum amount of people that are not in your Artist or Composer Filter field who are allowed</span>
        </div>
        <input
          id="search-input-max-other-people"
          #maximumRandomsFilterInput
          class="textInputFilter filter-input-narrow"
          type="number"
          min="0"
          step="1"
          (keyup.enter)="onSearchCallKey()"
          (input)="maximumRandomsFilter = maximumRandomsFilterInput.value"
          [value]="maximumRandomsFilter"
        />
      </label>
      <label class="numeric-filter" for="search-input-min-group-members">
        <div class="tooltip">
          Min Group Members
          <span class="tooltiptext">This is the minimum amount of people from the group in Artist or Composer filter that needs to be present (only useful for groups)</span>
        </div>
        <input
          id="search-input-min-group-members"
          #minimalMembersFilterInput
          class="textInputFilter filter-input-narrow"
          type="number"
          min="0"
          step="1"
          (keyup.enter)="onSearchCallKey()"
          (input)="minimalMembersFilter = minimalMembersFilterInput.value"
          [value]="minimalMembersFilter"
        />
      </label>
    </div>

    <div class="filter-field-row">
      <label
        title="Define how the filters will be combine together"
        for="search-select-filter-combination"
        >Filters Combination:
      </label>
      <select
        id="search-select-filter-combination"
        (change)="selectFilterCombinationChangeHandler($event)"
        class="selectFilter"
      >
        <option
          title=" A song needs to match at least one of the filters"
          selected="selected"
        >
          Union (OR)
        </option>
        <option title="A song needs to match every filter">Intersection (AND)</option>
      </select>

      <label class="check" for="search-adv-checkbox-ignore-duplicates"
        ><input
          id="search-adv-checkbox-ignore-duplicates"
          type="checkbox"
          (change)="ignoreDuplicate = !ignoreDuplicate"
          [checked]="ignoreDuplicate"
        />
        Ignore Duplicates
      </label>
    </div>

    <div class="filter-field-row">
      <span class="filter-group-label">Broadcast:</span>
      <label class="check" for="search-adv-checkbox-normal-broadcasts"
        ><input
          id="search-adv-checkbox-normal-broadcasts"
          type="checkbox"
          (change)="showNormalBroadcasts = !showNormalBroadcasts"
          [checked]="showNormalBroadcasts"
        />
        Normal
      </label>
      <label class="check" for="search-adv-checkbox-dubs"
        ><input
          id="search-adv-checkbox-dubs"
          type="checkbox"
          (change)="showDubs = !showDubs"
          [checked]="showDubs"
        />
        Dubs
      </label>
      <label class="check" for="search-adv-checkbox-rebroadcasts"
        ><input
          id="search-adv-checkbox-rebroadcasts"
          type="checkbox"
          (change)="showRebroadcasts = !showRebroadcasts"
          [checked]="showRebroadcasts"
        />
        Rebroadcasts
      </label>
    </div>

    <div class="filter-field-row">
      <span class="filter-group-label">Performance:</span>
      <label class="check" for="search-adv-checkbox-standard"
        ><input
          id="search-adv-checkbox-standard"
          type="checkbox"
          (change)="showStandards = !showStandards"
          [checked]="showStandards"
        />
        Standard
      </label>
      <label class="check" for="search-adv-checkbox-character"
        ><input
          id="search-adv-checkbox-character"
          type="checkbox"
          (change)="showCharacters = !showCharacters"
          [checked]="showCharacters"
        />
        Character
      </label>
      <label class="check" for="search-adv-checkbox-chanting"
        ><input
          id="search-adv-checkbox-chanting"
          type="checkbox"
          (change)="showChantings = !showChantings"
          [checked]="showChantings"
        />
        Chanting
      </label>
      <label class="check" for="search-adv-checkbox-instrumental"
        ><input
          id="search-adv-checkbox-instrumental"
          type="checkbox"
          (change)="showInstrumentals = !showInstrumentals"
          [checked]="showInstrumentals"
        />
        Instrumental
      </label>
    </div>

    <div class="filter-field-row">
      <span class="filter-group-label">Media:</span>
      <label class="check" for="search-adv-checkbox-tv"
        ><input
          id="search-adv-checkbox-tv"
          type="checkbox"
          (change)="showTv = !showTv"
          [checked]="showTv"
        />
        TV
      </label>
      <label class="check" for="search-adv-checkbox-movie"
        ><input
          id="search-adv-checkbox-movie"
          type="checkbox"
          (change)="showMovie = !showMovie"
          [checked]="showMovie"
        />
        Movie
      </label>
      <label class="check" for="search-adv-checkbox-ova"
        ><input
          id="search-adv-checkbox-ova"
          type="checkbox"
          (change)="showOva = !showOva"
          [checked]="showOva"
        />
        OVA
      </label>
      <label class="check" for="search-adv-checkbox-ona"
        ><input
          id="search-adv-checkbox-ona"
          type="checkbox"
          (change)="showOna = !showOna"
          [checked]="showOna"
        />
        ONA
      </label>
      <label class="check" for="search-adv-checkbox-special"
        ><input
          id="search-adv-checkbox-special"
          type="checkbox"
          (change)="showSpecial = !showSpecial"
          [checked]="showSpecial"
        />
        Special
      </label>
      <label class="check" for="search-adv-checkbox-doujin"
        ><input
          id="search-adv-checkbox-doujin"
          type="checkbox"
          (change)="showDoujin = !showDoujin"
          [checked]="showDoujin"
        />
        Doujin
      </label>
    </div>

    <button id="search-btn-advanced" type="button" class="search-btn" (click)="onSearchCallKey()">Search</button>
  </div>
